<!DOCTYPE html>
<html lang="vi" data-lms-require="enrolled">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 1 · Bài 5 — 今天我休息</title>
<!--
  ============================================================================
  HSK 1 · BÀI 5: 今天我休息 (I'm off today)
  Ứng dụng học tiếng Trung tương tác — MỘT FILE HTML DUY NHẤT, chạy offline.
  Không thư viện ngoài · Không API mạng · Phát âm bằng Speech Synthesis API.
  ----------------------------------------------------------------------------
  CẤU TRÚC MÃ NGUỒN:
    1. CSS  — hệ thống thiết kế (biến màu, layout, responsive)
    2. DATA — toàn bộ dữ liệu bài học (LESSON) ở đầu <script> để dễ tái sử dụng
    3. CORE — state/localStorage, TTS, điều hướng, tiến trình, cỡ chữ, điểm số
    4. SECTIONS — hàm render cho 13 phần học
    5. INIT  — khởi tạo
  ----------------------------------------------------------------------------
  MUỐN DÙNG CHO BÀI KHÁC? Chỉ cần thay đối tượng LESSON bên dưới.
  MUỐN THÊM GIF THỨ TỰ NÉT? Đặt chuỗi Base64 Data URI vào trường `gif`
  của từng Hán tự trong LESSON.chars (mặc định null = hiển thị placeholder).
  ============================================================================
-->
<style>
/* ========================= 1. HỆ THỐNG THIẾT KẾ ========================= */
:root{
  --bg:#b91c1c; --bg2:#dc2626; --card:#ffffff; --card2:#fff7f7;
  --ink:#3f1414; --ink-soft:#7f1d1d; --muted:#c98a8a;
  --brand:#dc2626; --brand2:#ef4444; --brand-soft:#fef2f2;
  --accent:#0891b2; --accent-soft:#ecfeff;
  --gold:#d97706; --gold-soft:#fffbeb;
  --ok:#16a34a; --ok-soft:#f0fdf4; --bad:#dc2626; --bad-soft:#fef2f2;
  --line:#f4dcdc; --shadow:0 10px 30px rgba(153,27,27,.10);
  --radius:18px; --fs:1; /* hệ số cỡ chữ, điều chỉnh bằng nút A-/A+ */
  --hz:'Noto Sans SC','PingFang SC','Microsoft YaHei','Heiti SC',sans-serif;
  --ui-font:'Times New Roman', Times, 'Liberation Serif', 'Tinos', serif; /* phông tiếng Việt, đổi được */
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--ui-font);
  font-size:calc(17px * var(--fs)); line-height:1.6; color:var(--ink);
  background:linear-gradient(160deg,#ffffff,#fff1f2); min-height:100vh;
}
.zh{font-family:var(--hz);}
/* --- Ẩn pinyin / nghĩa tiếng Việt để luyện nhớ Hán tự (làm mờ; bấm để xem tạm) --- */
body.hide-py .pinyin, body.hide-py .py{filter:blur(6px);cursor:pointer;transition:filter .15s}
body.hide-py .pinyin.reveal, body.hide-py .py.reveal{filter:none}
body.hide-vi .gloss-vi, body.hide-vi .reading .vi{filter:blur(6px);cursor:pointer;transition:filter .15s}
body.hide-vi .gloss-vi.reveal, body.hide-vi .reading .vi.reveal{filter:none}
/* --------- Thanh trên cùng (header cố định) --------- */
header{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(120deg,var(--bg),var(--bg2));
  color:#fff; box-shadow:0 4px 18px rgba(153,27,27,.28);
}
.top{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.05em;white-space:nowrap}
.brand .logo{width:38px;height:38px;border-radius:12px;background:#fff;color:var(--brand);display:grid;place-items:center;font-family:var(--hz);font-size:1.3em;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.top .spacer{flex:1}
.tool{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tool button,.pill{
  background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);
  border-radius:12px;padding:7px 11px;font-size:.9em;cursor:pointer;font-weight:600;transition:.15s;
}
.tool button:hover{background:rgba(255,255,255,.25)}
.tool select{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:6px 8px;font-size:.85em;max-width:190px}
.tool select option{color:#111}
.scorechip{background:var(--gold);border-color:transparent;font-weight:800}
/* --------- Thanh tiến trình --------- */
.progwrap{max-width:1200px;margin:0 auto;padding:0 16px 10px}
.progbar{height:9px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden}
.progfill{height:100%;width:0;background:linear-gradient(90deg,#ffffff,#fecaca);transition:width .5s}
.progtxt{font-size:.78em;color:#cbd5e1;margin-top:4px}
/* --------- Điều hướng --------- */
nav{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.navscroll{max-width:1200px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding:8px 12px;scrollbar-width:thin}
.navscroll button{
  white-space:nowrap;border:none;background:transparent;color:var(--ink-soft);
  padding:8px 12px;border-radius:11px;font-size:.9em;font-weight:600;cursor:pointer;transition:.15s;display:flex;gap:6px;align-items:center;
}
.navscroll button .n{background:var(--line);color:var(--ink-soft);border-radius:8px;width:22px;height:22px;display:grid;place-items:center;font-size:.8em;font-weight:800}
.navscroll button:hover{background:var(--card2)}
.navscroll button.active{background:var(--brand-soft);color:var(--brand)}
.navscroll button.active .n{background:var(--brand);color:#fff}
.navscroll button.done .n{background:var(--ok);color:#fff}
/* --------- Bố cục chính --------- */
main{max-width:1080px;margin:0 auto;padding:22px 16px 90px}
.section{display:none;animation:fade .4s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-head{margin-bottom:18px}
.sec-head .kicker{color:var(--brand);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.8em}
.sec-head h2{font-size:1.7em;margin:2px 0 4px;line-height:1.2}
.sec-head p{color:var(--ink-soft)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.g3{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.btn{border:none;border-radius:12px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:.95em;transition:.15s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand2)}
.btn-ghost{background:var(--card2);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:#eef2f7}
.btn-accent{background:var(--accent);color:#fff}
.btn-sm{padding:6px 11px;font-size:.85em;border-radius:10px}
.spk{background:var(--accent-soft);color:var(--accent);border:1px solid #a5f3fc;border-radius:10px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:.85em;display:inline-flex;gap:5px;align-items:center}
.spk:hover{background:#cffafe}
.tag{display:inline-block;background:var(--card2);border:1px solid var(--line);color:var(--ink-soft);border-radius:99px;padding:2px 10px;font-size:.72em;font-weight:700}
.hz-big{font-family:var(--hz);font-size:3em;font-weight:700;line-height:1}
.pinyin{color:var(--accent);font-weight:700}
.divider{height:1px;background:var(--line);margin:12px 0}
/* --------- Từ vựng card --------- */
.vcard{position:relative;display:flex;flex-direction:column;gap:6px}
.vcard .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.vcard .han{font-family:var(--hz);font-size:2.5em;font-weight:700;line-height:1}
.vcard .py{color:var(--accent);font-weight:700;font-size:1.1em}
.vcard .mean{font-weight:600}
.vcard .mean small{color:var(--muted);font-weight:500}
.vcard .ex{background:var(--card2);border-radius:12px;padding:10px;font-size:.92em;border:1px solid var(--line)}
.vcard .ex .exh{font-family:var(--hz);font-size:1.15em;font-weight:600}
.vcard .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:6px}
/* --------- Hán tự --------- */
.hz-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.hz-layout{grid-template-columns:1fr}}
.hz-list{max-height:640px;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px}
.hz-item{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:8px 10px;cursor:pointer;background:#fff;transition:.15s}
.hz-item:hover{background:var(--card2)}
.hz-item.sel{border-color:var(--brand);background:var(--brand-soft)}
.hz-item .c{font-family:var(--hz);font-size:1.8em;font-weight:700;width:44px;text-align:center}
.hz-item .meta{flex:1;min-width:0}
.hz-item .st{font-size:.75em;color:var(--muted)}
.hz-item .mark{font-size:1.2em}
.hz-detail .grid-frame{position:relative;width:220px;height:220px;margin:auto;background:#fff;border:2px solid var(--brand);border-radius:8px}
.mizige{position:absolute;inset:0;pointer-events:none}
.gifbox{width:220px;height:220px;margin:auto;border:2px dashed var(--muted);border-radius:8px;display:grid;place-items:center;text-align:center;color:var(--muted);padding:12px;background:var(--card2);font-size:.85em}
.canvas-wrap{position:relative;width:220px;height:220px;margin:auto;touch-action:none}
#writeCanvas{position:absolute;inset:0;background:transparent;border-radius:8px;cursor:crosshair}
.hint-char{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--hz);font-size:150px;line-height:1;color:rgba(124,58,237,.22);pointer-events:none;user-select:none;overflow:hidden}
.hw-guide{position:absolute;inset:0;display:none;pointer-events:none;z-index:1}
.hw-guide svg{display:block;margin:auto}
#gifHost .hw-anim{width:220px;height:220px;margin:auto;position:relative;background:#fff;border:2px solid var(--brand);border-radius:8px}
.hw-anim svg{display:block}
.hw-status{text-align:center;color:var(--ink-soft);font-size:.85em;margin-top:6px}
.assess{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.assess .a{flex:1;min-width:90px}
/* --------- Flashcard --------- */
.flash-stage{perspective:1400px;max-width:420px;margin:0 auto}
.flash{position:relative;width:100%;height:290px;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.flash.flip{transform:rotateY(180deg)}
.flash .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;background:#fff}
.flash .back{transform:rotateY(180deg);background:var(--brand-soft)}
.flash .face .big{font-family:var(--hz);font-size:4em;font-weight:700}
/* --------- Bài tập chung --------- */
.ex-block{margin-bottom:14px}
.q{font-weight:600;margin-bottom:10px}
.q .zh{font-size:1.15em}
.opts{display:grid;gap:8px}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;text-align:left;cursor:pointer;font-size:.98em;transition:.12s;font-family:inherit;display:flex;gap:8px;align-items:center}
.opt:hover{border-color:var(--brand);background:var(--brand-soft)}
.opt.correct{border-color:var(--ok);background:var(--ok-soft);color:#166534;font-weight:700}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft);color:#991b1b}
.opt.disabled{pointer-events:none;opacity:.85}
.feedback{margin-top:10px;padding:10px 12px;border-radius:12px;font-size:.9em;display:none}
.feedback.show{display:block}
.feedback.ok{background:var(--ok-soft);color:#166534;border:1px solid #bbf7d0}
.feedback.bad{background:var(--bad-soft);color:#991b1b;border:1px solid #fecaca}
.input{border:2px solid var(--line);border-radius:10px;padding:8px 12px;font-size:1em;font-family:var(--hz);width:100%;max-width:260px}
.input:focus{outline:none;border-color:var(--brand)}
.score-line{display:flex;align-items:center;gap:10px;background:var(--gold-soft);border:1px solid #fde68a;border-radius:12px;padding:8px 14px;font-weight:700;color:var(--gold);margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip-word{font-family:var(--hz);border:2px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font-size:1.05em;cursor:pointer;user-select:none;transition:.12s}
.chip-word:hover{border-color:var(--brand)}
.chip-word.used{opacity:.35;pointer-events:none}
.drop-zone{min-height:52px;border:2px dashed var(--line);border-radius:12px;padding:8px;display:flex;gap:8px;flex-wrap:wrap;background:var(--card2);margin-bottom:8px}
.drop-zone .chip-word{background:var(--brand-soft);border-color:var(--brand2)}
/* --------- Memory game --------- */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:520px}
@media(max-width:520px){.mem-grid{grid-template-columns:repeat(3,1fr)}}
.mem-cell{aspect-ratio:1;border-radius:12px;background:var(--bg2);color:transparent;display:grid;place-items:center;font-family:var(--hz);font-size:1.1em;font-weight:700;cursor:pointer;border:none;transition:.2s;padding:4px;text-align:center}
.mem-cell.open{background:#fff;color:var(--ink);border:2px solid var(--accent)}
.mem-cell.matched{background:var(--ok-soft);color:var(--ok);border:2px solid var(--ok);cursor:default}
/* --------- Đọc --------- */
.reading .line{padding:8px 10px;border-radius:10px;transition:.2s;cursor:pointer}
.reading .line:hover{background:var(--card2)}
.reading .line.speaking{background:var(--gold-soft);box-shadow:0 0 0 2px var(--gold) inset}
.reading .spk-name{font-weight:800;color:var(--brand);font-family:var(--hz)}
.reading .han{font-family:var(--hz);font-size:1.35em}
.reading .py{color:var(--accent);font-size:.9em}
.reading .vi{color:var(--ink-soft);font-size:.9em;font-style:italic}
.hidden{display:none!important}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.switch{display:inline-flex;align-items:center;gap:6px;font-size:.88em;font-weight:600;color:var(--ink-soft);cursor:pointer;user-select:none}
.switch input{width:38px;height:22px;appearance:none;background:var(--line);border-radius:99px;position:relative;cursor:pointer;transition:.2s}
.switch input:checked{background:var(--brand)}
.switch input::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
.switch input:checked::after{left:19px}
/* --------- Thông báo giọng đọc --------- */
.voicewarn{background:var(--bad-soft);border:1px solid #fecaca;color:#991b1b;border-radius:12px;padding:12px 14px;margin:12px 0;font-size:.9em;display:none}
.voicewarn.show{display:block}
/* --------- Kết quả / thống kê --------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.stat{background:linear-gradient(160deg,#fff,var(--card2));border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat .num{font-size:2em;font-weight:800;color:var(--brand)}
.stat .lbl{font-size:.82em;color:var(--ink-soft);font-weight:600}
.summary-box{background:var(--accent-soft);border:1px solid #a5f3fc;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.summary-box h4{color:var(--accent);margin-bottom:6px}
ul.clean{list-style:none;display:flex;flex-direction:column;gap:6px}
ul.clean li{padding-left:20px;position:relative}
ul.clean li::before{content:'▸';position:absolute;left:0;color:var(--brand)}
.result-banner{border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;font-weight:700}
.footer-nav{display:flex;justify-content:space-between;margin-top:18px;gap:10px}
.badge-pos{background:var(--accent-soft);color:var(--accent);border:1px solid #a5f3fc}
/* --------- Toast --------- */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--bg);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;z-index:100;transition:.35s;box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0)}
kbd{background:var(--bg2);color:#fff;border-radius:6px;padding:1px 7px;font-size:.85em;font-family:var(--hz)}
.speed-seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.speed-seg button{border:none;background:#fff;padding:6px 12px;cursor:pointer;font-weight:600;font-size:.85em}
.speed-seg button.on{background:var(--accent);color:#fff}
@media(max-width:640px){.sec-head h2{font-size:1.4em}.hz-detail .grid-frame,.canvas-wrap,.gifbox{width:200px;height:200px}.hint-char{font-size:135px}}
</style>
  </head>

<!-- ============================== HEADER ============================== -->
<header>
  <div class="top">
    <div class="brand"><span class="logo zh">语</span><span>HSK 1 · Bài 5</span></div>
    <div class="spacer"></div>
    <div class="tool">
      <select id="voiceSelect" title="Chọn giọng đọc tiếng Trung"></select>
      <select id="fontSelect" title="Chọn phông chữ tiếng Việt"></select>
      <button id="btnHidePy" title="Ẩn/hiện pinyin (luyện nhớ Hán tự)">拼 Pinyin</button>
      <button id="btnHideVi" title="Ẩn/hiện nghĩa tiếng Việt (luyện nhớ Hán tự)">🇻🇳 Nghĩa</button>

  </div>
</header>
<!-- ============================== NAV ============================== -->
<nav><div class="navscroll" id="nav"></div></nav>
<!-- ============================== MAIN ============================== -->
<main id="main"></main>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   2. DỮ LIỆU BÀI HỌC  (thay đổi phần này để dùng cho bài học khác)
   ============================================================================ */
const LESSON = {
  title:"今天我休息", pinyin:"Jīntiān wǒ xiūxi", en:"I'm off today",
  level:"HSK 1", duration:"120 phút",
  objectives:[
    {vi:"Nghe hiểu, đọc hiểu và mô tả ngày tháng của sự việc, hành động theo cách nói của người Trung Quốc.",
     en:"Understand, read and describe the dates of events or actions according to Chinese conventions."},
    {vi:"Nghe hiểu và dùng động từ năng nguyện “会” để diễn đạt việc biết làm hoặc có khả năng làm việc gì đó.",
     en:"Understand and use the modal verb 会 to express the knowledge or ability to perform an action."},
    {vi:"Nắm được cách dùng câu vị ngữ danh từ (名词谓语句).",
     en:"Master the use of nominal-predicate sentences."}
  ],
  // ------- TỪ VỰNG (22 từ mới) -------
  words:[
    {id:"w1", han:"今天", py:"jīntiān", pos:"danh từ · n.", vi:"hôm nay", en:"today",
      ex:{han:"今天9月8号。", py:"Jīntiān jiǔ yuè bā hào.", vi:"Hôm nay ngày 8 tháng 9.", en:"Today is September 8."}},
    {id:"w2", han:"号", py:"hào", pos:"lượng từ · m.", vi:"ngày (trong tháng, khẩu ngữ)", en:"date",
      ex:{han:"今天几号？", py:"Jīntiān jǐ hào?", vi:"Hôm nay ngày mấy?", en:"What's the date today?"}},
    {id:"w3", han:"月", py:"yuè", pos:"danh từ · n.", vi:"tháng", en:"month",
      ex:{han:"今天五月一号。", py:"Jīntiān wǔ yuè yī hào.", vi:"Hôm nay ngày 1 tháng 5.", en:"Today is May 1."}},
    {id:"w4", han:"日", py:"rì", pos:"lượng từ · m.", vi:"ngày (văn viết)", en:"day",
      ex:{han:"9月8日。", py:"Jiǔ yuè bā rì.", vi:"Ngày 8 tháng 9.", en:"September 8."}},
    {id:"w5", han:"星期", py:"xīngqī", pos:"danh từ · n.", vi:"tuần; thứ (trong tuần)", en:"week",

/* ============================================================================
   3. CORE — trạng thái, localStorage, TTS, điều hướng, tiến trình, điểm số
   ============================================================================ */
const STORE_KEY = "hsk1_bai5_xiuxi_v1";
const DEFAULT_STATE = {
  score:0, maxScore:0,
  learnedWords:{}, reviewWords:{},          // theo id từ
  charStatus:{},                            // char -> 'remembered'|'practice'|'notyet'
  visited:{},                               // section id -> true
  fontScale:1, voiceURI:null, speed:"normal",
  hidePy:false, hideVi:false,                // ẩn pinyin / nghĩa VI để luyện nhớ Hán tự
  uiFont:null                                // phông chữ tiếng Việt do học sinh chọn
};
let STATE = load();

function load(){
  try{ const s = JSON.parse(localStorage.getItem(STORE_KEY)); if(s) return Object.assign({}, DEFAULT_STATE, s); }
  catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(STATE)); }catch(e){} }

/* --------- Điểm số (không cộng trùng nhờ khóa itemKey) --------- */
const scoredKeys = {}; // tránh cộng điểm lặp trong cùng phiên cho cùng câu
function award(itemKey, points, maxPoints){
  if(maxPoints===undefined) maxPoints=points>0?points:1;
  if(!scoredKeys[itemKey]){
    scoredKeys[itemKey]="counted";
    STATE.maxScore += maxPoints;
  }
  if(scoredKeys[itemKey]!=="won" && points>0){
    scoredKeys[itemKey]="won";
    STATE.score += points;
  }
  save(); renderScore(); updateProgress();
}
function renderScore(){ document.getElementById('scoreChip').textContent = "★ "+STATE.score; }

function applyFont(css){ document.documentElement.style.setProperty('--ui-font', css || UI_FONTS[0].css); }
function buildFontSelect(){
  const sel=document.getElementById('fontSelect'); if(!sel) return;
  sel.innerHTML='';
  UI_FONTS.forEach(f=>{ const o=document.createElement('option'); o.value=f.css; o.textContent='🔤 '+f.name;
    o.style.fontFamily=f.css; if(STATE.uiFont===f.css) o.selected=true; sel.appendChild(o); });
}

/* --------- Ẩn/hiện pinyin & nghĩa tiếng Việt (luyện nhớ Hán tự) --------- */
function applyHideModes(){
  document.body.classList.toggle('hide-py', !!STATE.hidePy);
  document.body.classList.toggle('hide-vi', !!STATE.hideVi);
  const on=(b,active,onLbl,offLbl)=>{ if(!b)return; b.textContent=active?onLbl:offLbl;
    b.style.background=active?'#fff':''; b.style.color=active?'var(--brand)':''; b.style.borderColor=active?'#fff':''; b.style.fontWeight=active?'800':''; };
  on(document.getElementById('btnHidePy'), STATE.hidePy, '拼 Hiện pinyin', '拼 Pinyin');
  on(document.getElementById('btnHideVi'), STATE.hideVi, '🇻🇳 Hiện nghĩa', '🇻🇳 Nghĩa');
}

/* --------- Cỡ chữ --------- */
function setFont(scale){
  STATE.fontScale = Math.min(1.6, Math.max(0.8, scale));
  document.documentElement.style.setProperty('--fs', STATE.fontScale);
  save();
}
/* --------- Toast --------- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------------------------------------------------------------------------
   TTS — Speech Synthesis, CHỈ dùng giọng tiếng Trung tự nhiên
   --------------------------------------------------------------------------- */
const TTS = {
  voices:[], zhVoices:[], current:null, ready:false,
  speeds:{slow:0.7, normal:0.9, fast:1.1},
  init(){
    if(!('speechSynthesis' in window)){ this.showWarn(true); return; }
    this.refresh();
    window.speechSynthesis.onvoiceschanged = ()=>this.refresh();
    // một số trình duyệt cần vài lần thử
    let tries=0; const iv=setInterval(()=>{ this.refresh(); if(this.zhVoices.length||++tries>8) clearInterval(iv); },400);
  },
  refresh(){
    this.voices = window.speechSynthesis.getVoices()||[];
    // Lọc CHỈ giọng tiếng Trung (zh). Không hiển thị giọng khác.
    this.zhVoices = this.voices.filter(v=>/^zh(\b|-|_)/i.test(v.lang)||/chinese|中文|普通话|國語|国语|mandarin/i.test(v.name));
    // Ưu tiên: zh-CN > enhanced/premium/natural > nữ
    const rank=(v)=>{
      let s=0; const lang=(v.lang||'').toLowerCase(), name=(v.name||'').toLowerCase();
      if(lang.startsWith('zh-cn')||lang==='zh_cn'||lang==='zh') s+=100;
      else if(lang.startsWith('zh')) s+=60;
      if(/enhanced|premium|natural|neural|siri/.test(name)) s+=40;
      if(v.localService) s+=15;              // giọng cài sẵn trên máy → offline
      if(/tingting|meijia|sinji|female|婷婷|美佳|女/.test(name)) s+=8;
      return s;
    };
    this.zhVoices.sort((a,b)=>rank(b)-rank(a));
    this.buildSelect();
    // chọn giọng
    if(this.zhVoices.length){
      let v=null;
      if(STATE.voiceURI) v=this.zhVoices.find(x=>x.voiceURI===STATE.voiceURI);
      this.current = v || this.zhVoices[0];
      this.showWarn(false); this.ready=true;
    }else{
      this.current=null; this.showWarn(true);
    }
  },
  buildSelect(){
    const sel=document.getElementById('voiceSelect');
    if(!sel) return;
    const cur = STATE.voiceURI || (this.current&&this.current.voiceURI);
    sel.innerHTML='';
    if(!this.zhVoices.length){ const o=document.createElement('option'); o.textContent='(Chưa có giọng tiếng Trung)'; sel.appendChild(o); return; }
    this.zhVoices.forEach(v=>{
      const o=document.createElement('option'); o.value=v.voiceURI;
      o.textContent = v.name+' · '+v.lang+(v.localService?' ✓':'');
      if(v.voiceURI===cur) o.selected=true;
      sel.appendChild(o);
    });
  },
  setVoice(uri){ const v=this.zhVoices.find(x=>x.voiceURI===uri); if(v){ this.current=v; STATE.voiceURI=uri; save(); } },
  setSpeed(s){ STATE.speed=s; save(); },
  showWarn(show){
    let w=document.getElementById('voiceWarn');
    if(w) w.classList.toggle('show', show);
  },
  speak(text, opts){
    opts=opts||{};
    if(!('speechSynthesis' in window)){ toast('Trình duyệt không hỗ trợ phát âm.'); return; }
    if(!this.current){ this.refresh(); if(!this.current){ toast('Chưa có giọng tiếng Trung. Xem hướng dẫn cài giọng.'); this.showWarn(true); return; } }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.voice=this.current; u.lang=this.current.lang||'zh-CN';
    u.rate = opts.rate || this.speeds[STATE.speed] || 0.9;
    u.pitch = 1;
    if(opts.onend) u.onend=opts.onend;
    if(opts.onstart) u.onstart=opts.onstart;
    window.speechSynthesis.speak(u);
    return u;
  },
  stop(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }
};

function buildNav(){

    b.innerHTML='<span class="n">'+s.n+'</span><span>'+s.label+'</span>';

function goto(id){
  TTS.stop();
  currentSection=id;
  STATE.visited[id]=true; save();
  document.querySelectorAll('.section').forEach(el=>el.classList.toggle('active', el.id==='sec-'+id));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  updateNavDone();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}
function updateNavDone(){
  document.querySelectorAll('#nav button').forEach(b=>{
    if(STATE.visited[b.dataset.id]) b.classList.add('done');
  });
}
function updateProgress(){
  const visited=Object.keys(STATE.visited).filter(k=>STATE.visited[k]).length;
  const secPct = visited/SECTIONS.length;
  const words = LESSON.words.length;
  const wl = Object.keys(STATE.learnedWords).filter(k=>STATE.learnedWords[k]).length;
  const cs = Object.keys(STATE.charStatus).length;
  // Tiến trình = trung bình có trọng số của: phần đã xem, từ đã nhớ, chữ đã đánh giá, điểm đạt
  const wordPct = words? wl/words : 0;
  const charPct = LESSON.chars.length? cs/LESSON.chars.length : 0;
  const scorePct = STATE.maxScore? Math.min(1, STATE.score/STATE.maxScore) : 0;
  const pct = Math.round((secPct*0.4 + wordPct*0.25 + charPct*0.15 + scorePct*0.2)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent='Tiến trình học tập: '+pct+'%  ·  Từ đã nhớ '+wl+'/'+words+'  ·  Hán tự đã luyện '+cs+'/'+LESSON.chars.length;
}

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function spkBtn(text, label){ const b=el('button','spk','🔊 '+(label||'Nghe')); b.onclick=(e)=>{e.stopPropagation();TTS.speak(text);}; return b; }

    b.onclick=()=>{ TTS.setSpeed(k); wrap.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
    wrap.appendChild(b);

}

/* Chỉ dùng phông tiếng Trung (.zh) khi chuỗi THỰC SỰ chứa chữ Hán/ký tự CJK.
   Tránh việc chữ tiếng Việt bị phông tiếng Trung làm hỏng dấu (vd "tạm biệt"). */
function cjk(s){ return /[㐀-鿿豈-﫿　-〿＀-￯]/.test(String(s)); }
function zhSpan(text, tag){ tag=tag||'span'; return '<'+tag+(cjk(text)?' class="zh"':'')+'>'+text+'</'+tag+'>'; }

/* ===== Khung bài tập trắc nghiệm dùng chung ===== */
function makeMCQ(parent, {key, q, qzh, options, correct, explain}){
  const block=el('div','ex-block');
  const qd=el('div','q'); qd.innerHTML=(q||'')+(qzh?' '+zhSpan(qzh):'');
  block.appendChild(qd);
  const opts=el('div','opts');
  let answered=false;
  const order=shuffle(options.map((o,i)=>({o,i})));
  order.forEach(({o,i})=>{
    const btn=el('button','opt'); btn.innerHTML=zhSpan(o);
    btn.onclick=()=>{
      if(answered) return; answered=true;
      opts.querySelectorAll('.opt').forEach(x=>x.classList.add('disabled'));
      const correctText = options[correct];
      if(i===correct){ btn.classList.add('correct'); fb.className='feedback show ok'; fb.innerHTML='✅ Chính xác! '+(explain||''); award(key,1); }
      else{
        btn.classList.add('wrong'); fb.className='feedback show bad';
        fb.innerHTML='❌ Chưa đúng. Đáp án: '+zhSpan(correctText,'b')+'. '+(explain||''); award(key,0);
        opts.querySelectorAll('.opt').forEach(x=>{ if(x.textContent===correctText) x.classList.add('correct'); });
      }
    };
    opts.appendChild(btn);
  });
  block.appendChild(opts);
  const fb=el('div','feedback'); block.appendChild(fb);
  parent.appendChild(block);
  return block;
}

/* ===== Nhập text (điền từ) dùng chung ===== */
function makeFill(parent, {key, q, qzh, accept, explain, placeholder}){
  const block=el('div','ex-block');
  const qd=el('div','q'); qd.innerHTML=(q||'')+(qzh?' '+zhSpan(qzh):''); block.appendChild(qd);
  const row=el('div',''); row.style.display='flex'; row.style.gap='8px'; row.style.flexWrap='wrap';
  const inp=el('input','input'); inp.placeholder=placeholder||'Nhập đáp án…';
  const btn=el('button','btn btn-primary btn-sm','Kiểm tra');
  row.appendChild(inp); row.appendChild(btn); block.appendChild(row);
  const fb=el('div','feedback'); block.appendChild(fb);
  const norm=s=>(s||'').trim().toLowerCase().replace(/[\s，,。!！？?]/g,'');
  let answered=false;
  const check=()=>{
    if(answered) return;
    const val=norm(inp.value);
    const ok=accept.map(norm).includes(val);
    answered=true; inp.disabled=true; btn.disabled=true;
    if(ok){ fb.className='feedback show ok'; fb.innerHTML='✅ Chính xác! '+(explain||''); award(key,1); }
    else{ fb.className='feedback show bad'; fb.innerHTML='❌ Chưa đúng. Đáp án: '+zhSpan(accept[0],'b')+'. '+(explain||''); award(key,0); }
  };
  btn.onclick=check; inp.onkeydown=e=>{ if(e.key==='Enter') check(); };
  parent.appendChild(block);
}

/* ===== Trò chơi NỐI CẶP dùng chung ===== */
function makeMatch(parent, {key, title, pairs, explain}){
  const block=el('div','ex-block');
  if(title) block.appendChild(el('div','q', title));
  const wrap=el('div',''); wrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
  const colL=el('div','opts'), colR=el('div','opts');
  const lefts=shuffle(pairs.map((p,i)=>({v:p.l,i}))), rights=shuffle(pairs.map((p,i)=>({v:p.r,i})));
  let selL=null, matched=0;
  const fb=el('div','feedback');
  lefts.forEach(p=>{ const b=el('button','opt'); b.innerHTML=zhSpan(p.v); b.dataset.i=p.i;
    b.onclick=()=>{ if(b.classList.contains('correct'))return; colL.querySelectorAll('.opt').forEach(x=>x.style.outline=''); selL=b; b.style.outline='3px solid var(--brand)'; };
    colL.appendChild(b); });
  rights.forEach(p=>{ const b=el('button','opt'); b.innerHTML='<span>'+p.v+'</span>'; b.dataset.i=p.i;
    b.onclick=()=>{ if(!selL||b.classList.contains('correct'))return;
      if(selL.dataset.i===b.dataset.i){ selL.classList.add('correct');selL.classList.add('disabled'); b.classList.add('correct');b.classList.add('disabled'); selL.style.outline=''; selL=null; matched++;
        if(matched===pairs.length){ fb.className='feedback show ok'; fb.innerHTML='✅ Hoàn thành! '+(explain||''); award(key,1);} }
      else{ const s=selL; s.classList.add('wrong'); b.classList.add('wrong'); setTimeout(()=>{s.classList.remove('wrong');b.classList.remove('wrong');s.style.outline='';},600); selL=null; award(key,0); }
    };
    colR.appendChild(b); });
  wrap.appendChild(colL); wrap.appendChild(colR); block.appendChild(wrap); block.appendChild(fb);
  parent.appendChild(block);
}

/* ===== Sắp xếp (thứ tự từ / pinyin) dùng chung ===== */
function makeArrange(parent, {key, q, qzh, tokens, answer, explain}){
  const block=el('div','ex-block');
  const qd=el('div','q'); qd.innerHTML=(q||'')+(qzh?' '+zhSpan(qzh):''); block.appendChild(qd);
  const zone=el('div','drop-zone'); block.appendChild(zone);
  const pool=el('div','chips'); block.appendChild(pool);
  const placed=[];
  shuffle(tokens).forEach(t=>{
    const c=el('button','chip-word zh',t);
    c.onclick=()=>{ if(c.classList.contains('used'))return; c.classList.add('used'); const p=el('button','chip-word zh',t);
      p.onclick=()=>{ p.remove(); c.classList.remove('used'); const k=placed.indexOf(p); if(k>-1)placed.splice(k,1); };
      zone.appendChild(p); placed.push(p); };
    pool.appendChild(c);
  });
  const row=el('div','toolbar');
  const chk=el('button','btn btn-primary btn-sm','Kiểm tra');
  row.appendChild(chk); block.appendChild(row);
  const fb=el('div','feedback'); block.appendChild(fb);
  let done=false;
  chk.onclick=()=>{ if(done)return; const got=placed.map(p=>p.textContent).join('');
    const target=answer.join('');
    if(got===target){ done=true; fb.className='feedback show ok'; fb.innerHTML='✅ Chính xác! <span class="zh">'+answer.join(' ')+'</span> — '+(explain||''); award(key,1); }
    else{ fb.className='feedback show bad'; fb.innerHTML='❌ Chưa đúng. Thử lại. Gợi ý đáp án: <b class="zh">'+answer.join(' ')+'</b>'; award(key,0); }
  };
  parent.appendChild(block);
}

const WORD_IMG = { w1:'📅', w2:'🔢', w3:'🈷️', w4:'☀️', w5:'🗓️', w6:'😴',

function refreshHzMarks(){
  const icon={remembered:'✅',practice:'🔁',notyet:'❔'};
  LESSON.chars.forEach(ch=>{ const m=document.querySelector('[data-mark="'+ch.c+'"]'); if(m) m.textContent=icon[STATE.charStatus[ch.c]]||''; });
  const done=Object.keys(STATE.charStatus).length;
  const cnt=document.getElementById('hzCounter'); if(cnt) cnt.textContent='Hán tự đã đánh giá: '+done+' / '+LESSON.chars.length;

/* ---------------------------------------------------------------------------
   HANZIWRITER — animation thứ tự nét TỰ ĐỘNG (dùng dữ liệu nét thật)
   Chế độ HYBRID: ưu tiên dữ liệu nhúng offline (HANZI_DATA) → nếu không có thì
   tự tải dữ liệu nét từ CDN khi chạy (cần internet). Dữ liệu nét là dữ liệu
   THẬT (Make Me a Hanzi), KHÔNG bịa thứ tự nét.

   ➜ MUỐN CHẠY HOÀN TOÀN OFFLINE cho một chữ? Dán dữ liệu nét vào HANZI_DATA:
       HANZI_DATA["你"] = { strokes:[...], medians:[...] };   // JSON gốc HanziWriter
   Khi có dữ liệu offline, chữ đó sẽ chạy animation KHÔNG cần internet.
   --------------------------------------------------------------------------- */
window.HANZI_DATA = window.HANZI_DATA || {};   // { "汉": {strokes,medians}, ... }
const HW = {
  loaded:false, loading:false, failed:false, speed:1, _cbs:[],
  CDN_LIB:'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js',
  ensure(cb){
    if(this.loaded){ cb&&cb(true); return; }
    if(this.failed){ cb&&cb(false); return; }
    if(cb) this._cbs.push(cb);
    if(this.loading) return;
    this.loading=true;
    if(window.HanziWriter){ this._done(); return; }
    const s=document.createElement('script'); s.src=this.CDN_LIB; s.async=true;
    s.onload=()=>this._done();
    s.onerror=()=>{ this.loading=false; this.failed=true; this._flush(false); };
    (document.head||document.body).appendChild(s);
  },
  _done(){ this.loaded=!!window.HanziWriter; this.loading=false; this.failed=!this.loaded; this._flush(this.loaded); },
  _flush(ok){ const cbs=this._cbs.splice(0); cbs.forEach(c=>{try{c(ok);}catch(e){}}); },
  hasLocal(ch){ return !!window.HANZI_DATA[ch]; },
  // Tạo writer; charDataLoader offline-first, nếu không có dữ liệu offline thì để
  // HanziWriter tự tải từ CDN (mặc định).
  create(target, ch, opts){
    const base={ width:210, height:210, padding:6, showOutline:true,
      strokeColor:'#7c3aed', radicalColor:'#dc2626', outlineColor:'#e5d9f7',
      strokeAnimationSpeed:this.speed, delayBetweenStrokes:280 };
    const o=Object.assign(base, opts||{});
    if(window.HANZI_DATA[ch]) o.charDataLoader=(c,done)=>done(window.HANZI_DATA[c]);
    return window.HanziWriter.create(target, ch, o);
  }
};
/* Vẽ khung Mễ tự cách phía sau animation */
function mizigeBg(){
  const d=el('div',''); d.style.cssText='position:absolute;inset:0;pointer-events:none';
  d.innerHTML=mizigeSVG(); const svg=d.querySelector('svg'); if(svg){svg.style.width='100%';svg.style.height='100%';} return d;

/* Render animation thứ tự nét cho một chữ */
function renderGif(ch, host, replay){
  host.innerHTML='';
  // 1) Nếu giáo viên đã cung cấp GIF riêng (offline) → dùng GIF đó
  if(ch.gif){
    const img=new Image();
    img.style.cssText='width:220px;height:220px;margin:auto;display:block;border:2px solid var(--brand);border-radius:8px';
    host.appendChild(el('div','gifbox','⏳ Đang tải…'));
    img.onload=()=>{ host.innerHTML=''; host.appendChild(img); };
    img.onerror=()=>{ host.innerHTML='<div class="gifbox">⚠️ Không hiển thị được GIF cho chữ này.</div>'; };
    img.src = ch.gif + (replay?('#'+Date.now()):''); return;
  }
  // 2) Animation tự động bằng HanziWriter
  const box=el('div','hw-anim'); const grid=mizigeBg(); const target=el('div','');
  target.style.cssText='position:relative;z-index:1'; box.appendChild(grid); box.appendChild(target);
  host.appendChild(box);
  const status=el('div','hw-status', HW.hasLocal(ch.c)?'⏳ Đang dựng nét…':'⏳ Đang tải nét chữ…');
  host.appendChild(status);
  HW.ensure(function(ok){
    if(!ok){
      host.innerHTML='<div class="gifbox">🌐 <b>Cần internet để tải animation nét chữ</b><br>'+
        '<small>Animation dùng HanziWriter (giống trang của bạn). Khi có mạng sẽ tự chạy. '+
        'Muốn chạy offline chữ “'+ch.c+'”: thêm dữ liệu nét vào <code>HANZI_DATA["'+ch.c+'"]</code>.</small></div>';
      return;
    }
    try{
      const w=HW.create(target, ch.c, {
        onLoadCharDataError:function(){ host.innerHTML='<div class="gifbox">⚠️ <b>Không tải được dữ liệu nét cho “'+ch.c+'”.</b><br><small>Kiểm tra internet hoặc thêm dữ liệu offline vào HANZI_DATA.</small></div>'; }
      });
      status.remove();
      host._writer=w;
      w.animateCharacter();
    }catch(e){ status.textContent='⚠️ '+e.message; }
  });
}

function replayStroke(ch, host){
  if(host && host._writer){ try{ host._writer.animateCharacter(); return; }catch(e){} }
  renderGif(ch, host, true);
}

/* Canvas luyện viết — vẽ bằng chuột / cảm ứng (KHÔNG nhận dạng chữ tự động) */
function setupCanvas(canvas){
  const ctx=canvas.getContext('2d');
  ctx.lineWidth=9; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0f172a';
  let drawing=false;
  const pos=(e)=>{ const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height)}; };
  const start=(e)=>{ e.preventDefault(); drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move=(e)=>{ if(!drawing)return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
  const end=()=>{ drawing=false; };
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
}
function clearCanvas(canvas){ const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }

function buildMemory(parent, words){
  const host=el('div',''); parent.appendChild(host);
  const render=()=>{
    host.innerHTML='';
    const cards=[]; words.forEach(w=>{ cards.push({id:w.id,txt:w.han,zh:true}); cards.push({id:w.id,txt:w.py,zh:false}); });
    const deck=shuffle(cards);
    const grid=el('div','mem-grid'); let open=[], matched=0, lock=false;
    deck.forEach((cd)=>{
      const cell=el('button','mem-cell'+(cd.zh?' zh':''),cd.txt);
      cell.dataset.id=cd.id;
      cell.onclick=()=>{ if(lock||cell.classList.contains('matched')||cell.classList.contains('open'))return;
        cell.classList.add('open'); open.push(cell);
        if(open.length===2){ lock=true;
          if(open[0].dataset.id===open[1].dataset.id){ open.forEach(x=>{x.classList.remove('open');x.classList.add('matched');}); matched++; open=[]; lock=false;
            if(matched===words.length){ award('vp-memory',1); toast('🎉 Hoàn thành Memory Game!'); } }
          else{ setTimeout(()=>{ open.forEach(x=>x.classList.remove('open')); open=[]; lock=false; },800); }
        } };
      grid.appendChild(cell);
    });
    host.appendChild(grid);
  };
  render();
  const b=retryBtn('Chơi lại', render); b.style.marginTop='10px'; parent.appendChild(b);
}
function buildTimedGame(parent){
  const host=el('div',''); parent.appendChild(host);
  const play=()=>{
    host.innerHTML='';
    const info=el('div','toolbar'); info.innerHTML='<span id="tgTime" style="font-weight:800;color:var(--brand)">⏱ 30s</span> <span id="tgScore" style="font-weight:800">Đúng: 0</span>';
    host.appendChild(info);
    const qbox=el('div',''); host.appendChild(qbox);
    let time=30, correct=0, running=true, pool=shuffle(LESSON.words.slice());
    const timer=setInterval(()=>{ time--; const t=document.getElementById('tgTime'); if(t)t.textContent='⏱ '+time+'s'; if(time<=0){ end(); } },1000);
    const nextQ=()=>{
      if(!running)return;
      const w=pool[Math.floor(Math.random()*pool.length)];
      const opts=shuffle([w.vi,...shuffle(LESSON.words.filter(x=>x.id!==w.id)).slice(0,3).map(x=>x.vi)]);
      qbox.innerHTML='';
      const q=el('div','q'); q.innerHTML='Nghĩa của <span class="zh" style="font-size:1.3em">'+w.han+'</span> ('+w.py+')?';
      qbox.appendChild(q); qbox.appendChild(spkBtn(w.han,'Nghe'));
      const o=el('div','opts'); o.style.marginTop='8px';
      opts.forEach(op=>{ const b=el('button','opt',op); b.onclick=()=>{ if(!running)return; if(op===w.vi){ correct++; document.getElementById('tgScore').textContent='Đúng: '+correct; } else { b.classList.add('wrong'); } nextQ(); }; o.appendChild(b); });
      qbox.appendChild(o);
    };
    const end=()=>{ running=false; clearInterval(timer); qbox.innerHTML='<div class="feedback show ok">⏱ Hết giờ! Bạn trả lời đúng <b>'+correct+'</b> câu.</div>';
      award('vp-timed', correct>0?1:0); if(correct>=5) toast('Tuyệt vời! '+correct+' câu đúng 🎉'); };
    nextQ();
  };
  play();
  const b=retryBtn('Chơi lại', play); b.style.marginTop='10px'; parent.appendChild(b);
}

let readStop=false;
function clearReadHighlight(){ document.querySelectorAll('.reading .line.speaking').forEach(e=>e.classList.remove('speaking')); }
function playAllReading(){
  readStop=false; const lines=window._readLines||[];
  const go=(i)=>{ if(readStop||i>=lines.length){ clearReadHighlight(); return; }
    clearReadHighlight();
    const lineEl=document.querySelector('.reading .line[data-li="'+i+'"]');
    if(lineEl){ lineEl.classList.add('speaking'); lineEl.scrollIntoView({block:'center',behavior:'smooth'}); }
    TTS.speak(lines[i],{onend:()=>go(i+1)});
  };
  go(0);
}
function switchEl(label, checked, onchange){
  const w=el('label','switch'); const inp=el('input'); inp.type='checkbox'; inp.checked=checked;
  inp.onchange=()=>onchange(inp.checked); w.appendChild(inp); w.appendChild(el('span','',label)); return w;
}

let quizState=null;
function renderQuiz(host){
  host.innerHTML='';
  const bank=shuffle(quizBank());              // xáo trộn thứ tự câu hỏi
  quizState={total:bank.length, answered:0, correct:0, done:false};
  const wrap=el('div','');
  bank.forEach((item,i)=>{
    const card=el('div','card');
    card.appendChild(el('div','q','<b>Câu '+(i+1)+'.</b> '+item.q));
    if(item.t==='mc'){
      const order=shuffle(item.o.map((o,idx)=>({o,idx})));  // xáo trộn phương án
      const opts=el('div','opts'); let ans=false;
      order.forEach(({o,idx})=>{ const b=el('button','opt',zhSpan(o));
        b.onclick=()=>{ if(ans||quizState.done)return; ans=true; opts.querySelectorAll('.opt').forEach(x=>x.classList.add('disabled'));
          if(idx===item.a){ b.classList.add('correct'); quizState.correct++; } else { b.classList.add('wrong'); opts.querySelectorAll('.opt').forEach(x=>{ if(x.textContent===item.o[item.a]) x.classList.add('correct'); }); }
          card.dataset.exp=item.e; quizState.answered++; };
        opts.appendChild(b); });
      card.appendChild(opts);
    } else if(item.t==='fill'){
      const row=el('div',''); row.style.display='flex'; row.style.gap='8px';
      const inp=el('input','input'); const btn=el('button','btn btn-primary btn-sm','Trả lời'); row.appendChild(inp); row.appendChild(btn); card.appendChild(row);
      const fb=el('div','feedback'); card.appendChild(fb); let ans=false;
      const norm=s=>(s||'').trim().toLowerCase().replace(/[\s，,。!！]/g,'');
      btn.onclick=()=>{ if(ans||quizState.done)return; ans=true; inp.disabled=true; btn.disabled=true;
        const ok=item.a.map(norm).includes(norm(inp.value));
        if(ok){ fb.className='feedback show ok'; fb.textContent='✅ Đúng!'; quizState.correct++; } else { fb.className='feedback show bad'; fb.innerHTML='❌ Đáp án: '+zhSpan(item.a[0],'b'); }
        quizState.answered++; };
    } else if(item.t==='arr'){
      makeArrangeQuiz(card,item,()=>{quizState.answered++;},()=>{quizState.correct++;});
    }
    wrap.appendChild(card);
  });
  host.appendChild(wrap);

  const submit=el('button','btn btn-primary','✅ Nộp bài & xem kết quả'); submit.style.width='100%';
  const result=el('div',''); result.id='quizResult';
  submit.onclick=()=>{ quizState.done=true;
    const score=quizState.correct, total=quizState.total, pct=Math.round(score/total*100);
    award('quiz-final', score, total);   // cộng theo số câu đúng
    let msg,color;
    if(pct>=90){msg='🏆 Xuất sắc! Bạn đã nắm vững bài học.';color='var(--ok-soft)';}
    else if(pct>=70){msg='👍 Tốt! Ôn lại vài điểm nhỏ là hoàn hảo.';color='var(--gold-soft)';}
    else if(pct>=50){msg='🙂 Khá! Hãy xem lại từ vựng và ngữ pháp.';color='var(--gold-soft)';}
    else{msg='💪 Cần cố gắng thêm. Ôn lại Phần 2–6 rồi thử lại nhé.';color='var(--bad-soft)';}
    result.innerHTML='<div class="result-banner" style="background:'+color+'"><div style="font-size:1.6em">'+score+'/'+total+' ('+pct+'%)</div>'+msg+'</div>';
    // hiển thị giải thích
    const exp=el('div','card'); exp.innerHTML='<h3>Giải thích đáp án</h3>';
    bank.forEach((it,i)=>{ exp.innerHTML+='<div style="padding:6px 0;border-bottom:1px solid var(--line)"><b>Câu '+(i+1)+':</b> '+(it.e||'')+'</div>'; });
    result.appendChild(exp);
    const again=el('button','btn btn-ghost','🔀 Làm lại (xáo trộn câu hỏi & đáp án)'); again.onclick=()=>{ scoredKeys['quiz-final']=undefined; renderQuiz(host); };
    result.appendChild(again);
    result.scrollIntoView({behavior:'smooth'});
    updateProgress();
  };
  host.appendChild(submit); host.appendChild(result);
}
function makeArrangeQuiz(card,item,onAns,onCorrect){
  const zone=el('div','drop-zone'); const pool=el('div','chips'); const placed=[];
  shuffle(item.tok).forEach(t=>{ const c=el('button','chip-word zh',t);
    c.onclick=()=>{ if(c.classList.contains('used'))return; c.classList.add('used'); const p=el('button','chip-word zh',t);
      p.onclick=()=>{ p.remove(); c.classList.remove('used'); const k=placed.indexOf(p); if(k>-1)placed.splice(k,1); }; zone.appendChild(p); placed.push(p); };
    pool.appendChild(c); });
  card.appendChild(zone); card.appendChild(pool);
  const btn=el('button','btn btn-primary btn-sm','Trả lời'); const fb=el('div','feedback'); card.appendChild(btn); card.appendChild(fb);
  let ans=false;
  btn.onclick=()=>{ if(ans||(quizState&&quizState.done))return; ans=true;
    const ok=placed.map(p=>p.textContent).join('')===item.a.join('');
    if(ok){ fb.className='feedback show ok'; fb.textContent='✅ Đúng!'; onCorrect&&onCorrect(); } else { fb.className='feedback show bad'; fb.innerHTML='❌ Đáp án: <b class="zh">'+item.a.join(' ')+'</b>'; }
    onAns&&onAns(); };
}

function init(){
  // Tạo container cho từng phần + banner cảnh báo giọng đọc
  const main=document.getElementById('main');
  const warn=el('div','voicewarn'); warn.id='voiceWarn';
  warn.innerHTML='⚠️ <b>Chưa phát hiện giọng tiếng Trung tự nhiên trên thiết bị.</b> '+
    'Phần phát âm cần một giọng tiếng Trung (zh-CN). Hãy cài thêm giọng: '+
    '<br>• <b>Windows:</b> Settings → Time & Language → Language → thêm 中文(简体) → Speech.'+
    '<br>• <b>macOS/iOS:</b> Settings → Accessibility → Spoken Content → Voices → thêm giọng Trung (vd Tingting/Sinji).'+
    '<br>• <b>Android:</b> Cài đặt → Ngôn ngữ → Đầu ra văn bản-thành-giọng nói → tải gói tiếng Trung.'+
    ' Sau khi cài, tải lại trang. (Các phần khác vẫn dùng bình thường.)';
  main.appendChild(warn);
  SECTIONS.forEach(s=>{ const sec=el('section','section'); sec.id='sec-'+s.id; main.appendChild(sec); s.build(sec); });

  buildNav();
  setFont(STATE.fontScale);
  renderScore();

  // Nút header
  document.getElementById('btnFontUp').onclick=()=>{ setFont(STATE.fontScale+0.1); toast('Cỡ chữ: '+Math.round(STATE.fontScale*100)+'%'); };
  document.getElementById('btnFontDown').onclick=()=>{ setFont(STATE.fontScale-0.1); toast('Cỡ chữ: '+Math.round(STATE.fontScale*100)+'%'); };
  document.getElementById('btnReset').onclick=()=>{
    if(confirm('Đặt lại TOÀN BỘ tiến trình?\n\nĐiểm số, từ đã nhớ, đánh giá Hán tự và tiến trình sẽ bị xóa vĩnh viễn. Bạn có chắc chắn không?')){
      localStorage.removeItem(STORE_KEY);
      STATE=JSON.parse(JSON.stringify(DEFAULT_STATE));
      for(const k in scoredKeys) delete scoredKeys[k];
      save(); location.reload();
    }
  };
  document.getElementById('voiceSelect').onchange=(e)=>{ TTS.setVoice(e.target.value); toast('Đã đổi giọng đọc'); };

  // Phông chữ tiếng Việt
  buildFontSelect(); applyFont(STATE.uiFont);
  document.getElementById('fontSelect').onchange=(e)=>{ STATE.uiFont=e.target.value; save(); applyFont(STATE.uiFont); toast('Đã đổi phông chữ'); };

  // Ẩn/hiện pinyin & nghĩa VI
  document.getElementById('btnHidePy').onclick=()=>{ STATE.hidePy=!STATE.hidePy; save(); applyHideModes(); toast(STATE.hidePy?'Đã ẩn pinyin — bấm vào chỗ mờ để xem tạm':'Đã hiện pinyin'); };
  document.getElementById('btnHideVi').onclick=()=>{ STATE.hideVi=!STATE.hideVi; save(); applyHideModes(); toast(STATE.hideVi?'Đã ẩn nghĩa tiếng Việt — bấm vào chỗ mờ để xem tạm':'Đã hiện nghĩa'); };
  applyHideModes();
  // Bấm vào chỗ bị làm mờ để xem tạm (peek)
  document.addEventListener('click',(e)=>{
    const t=e.target.closest('.pinyin,.py,.gloss-vi,.vi'); if(!t) return;
    if(document.body.classList.contains('hide-py') && (t.classList.contains('pinyin')||t.classList.contains('py'))) t.classList.toggle('reveal');
    if(document.body.classList.contains('hide-vi') && (t.classList.contains('gloss-vi')||t.classList.contains('vi'))) t.classList.toggle('reveal');
  });

  TTS.init();
  goto('intro');
  updateProgress();
}
document.addEventListener('DOMContentLoaded', init);
